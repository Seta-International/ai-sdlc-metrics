apiVersion: 1

datasources:
  - name: ReportingPostgres
    type: postgres
    uid: reporting-postgres
    url: ${REPORTING_DB_HOST}:5432
    database: reporting
    user: reporting
    secureJsonData:
      password: ${REPORTING_DB_PASSWORD}
    jsonData:
      sslmode: require
      postgresVersion: 1700
      timescaledb: false
    isDefault: false
    editable: false
