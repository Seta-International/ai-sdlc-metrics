apiVersion: 1

# Auto-load JSON dashboards from /var/lib/grafana/dashboards (mounted in
# infra/docker/compose.dev.yml). Drop new *.json files there to add dashboards.
providers:
  - name: seta-dashboards
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
