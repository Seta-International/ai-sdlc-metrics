# Single origin for the AI SDLC stack: Cloudflare/LAN hit :3030, and this
# fans out — /export.xlsx to the exporter, everything else to Grafana.
# Keeping the Excel download on the same HTTPS origin as the dashboards is
# what makes browsers accept it (mixed-content downloads are blocked).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;

    location = /export.xlsx {
        proxy_pass http://exporter:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
