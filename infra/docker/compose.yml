# Standalone Grafana for AI SDLC metrics dashboards.
# Separate from agent-platform's own monitoring Grafana (different instance,
# different port) — this one only reads from reporting.metric_counts (via the
# metrics_wide/metrics_ratios views) through the ReportingPostgres datasource.
#
#   export REPORTING_DB_HOST=<rds-endpoint>
#   export REPORTING_DB_PASSWORD=<reporting-role-password>
#   docker compose -f infra/docker/compose.yml up -d
#
# Open: https://ai-metrics.seta-international.com (or http://192.168.90.127:3030
# on the LAN/VPN)   (login required)
# Admins edit: same URL, log in top-right with admin / $GF_ADMIN_PASSWORD.
#
# `name:` below pins the compose project name so this stack never collides
# with agent-platform's monitoring stack, regardless of which directory
# either is launched from (both happen to sit in a folder named "docker").
name: ai-sdlc-metrics

services:
  # Single entry point on :3030 — routes /export.xlsx to the exporter and
  # everything else to Grafana, so the Excel download shares the dashboards'
  # HTTPS origin (browsers block mixed-content downloads).
  proxy:
    image: nginx:1.27-alpine
    container_name: ai-sdlc-metrics-proxy
    restart: unless-stopped
    ports:
      - "3030:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - grafana
      - exporter

  grafana:
    image: grafana/grafana:12.0.1
    container_name: ai-sdlc-metrics-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: "https://ai-metrics.seta-international.com"
      REPORTING_DB_HOST: ${REPORTING_DB_HOST}
      REPORTING_DB_PASSWORD: ${REPORTING_DB_PASSWORD}
    volumes:
      - ../../infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ai-sdlc-metrics-grafana-data:/var/lib/grafana

  exporter:
    build:
      context: ../..
      dockerfile: infra/docker/exporter.Dockerfile
    container_name: ai-sdlc-metrics-exporter
    restart: unless-stopped
    environment:
      REPORTING_DB_URL: postgresql://reporting:${REPORTING_DB_PASSWORD}@${REPORTING_DB_HOST}:5432/reporting?sslmode=require
    ports:
      - "3031:8000"

volumes:
  ai-sdlc-metrics-grafana-data:
