# Standalone Grafana for AI SDLC metrics dashboards.
# Separate from agent-platform's own monitoring Grafana (different instance,
# different port) — this one only reads from the reporting.ai_sprint_metrics
# table via the ReportingPostgres datasource.
#
#   export REPORTING_DB_HOST=<rds-endpoint>
#   export REPORTING_DB_PASSWORD=<reporting-role-password>
#   docker compose -f infra/docker/compose.yml up -d
#
# Open: http://192.168.90.127:3100   (login required)
# Admins edit: same URL, log in top-right with admin / $GF_ADMIN_PASSWORD.
#
# `name:` below pins the compose project name so this stack never collides
# with agent-platform's monitoring stack, regardless of which directory
# either is launched from (both happen to sit in a folder named "docker").
name: ai-sdlc-metrics

services:
  grafana:
    image: grafana/grafana:12.0.1
    container_name: ai-sdlc-metrics-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: "http://192.168.90.127:3100"
      REPORTING_DB_HOST: ${REPORTING_DB_HOST}
      REPORTING_DB_PASSWORD: ${REPORTING_DB_PASSWORD}
    ports:
      - "3100:3000"
    volumes:
      - ../../infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ai-sdlc-metrics-grafana-data:/var/lib/grafana

volumes:
  ai-sdlc-metrics-grafana-data:
