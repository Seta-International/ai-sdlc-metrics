services:
  postgres:
    image: postgres:16
    container_name: future-postgres
    restart: on-failure
    shm_size: 256mb
    environment:
      POSTGRES_USER: future
      POSTGRES_PASSWORD: future
      POSTGRES_DB: future
    ports:
      - '5432:5432'
    volumes:
      - future-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U future -d future']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:8-alpine
    container_name: future-redis
    restart: on-failure
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  future-postgres-data:
