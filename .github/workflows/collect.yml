name: AI SDLC — Collect Metrics (Reusable)

on:
  workflow_call:
    inputs:
      project:            {required: true,  type: string}
      gh-repo:            {required: true,  type: string}
      jira-project:       {required: true,  type: string}
      jira-base:          {required: false, type: string, default: 'https://all-it.atlassian.net', description: 'Jira Cloud site URL — set when the project lives on a different site'}
      prod-env:           {required: false, type: string, default: 'production'}
      deploy-strategy:    {required: false, type: string, default: 'deployments'}
      month:              {required: false, type: string, default: '', description: "Calendar month 'YYYY-MM', or 'previous' for the prior calendar month; blank = current month"}
    secrets:
      jira-email:          {required: true}
      jira-token:          {required: true}
      jira-ai-usage-field: {required: true}
      reporting-db-url:    {required: true}
      jira-ai-tool-field:       {required: false, description: 'customfield id of the AI Tool field — enables ai_tasks_tool_* metrics'}
      jira-ai-time-saved-field: {required: false, description: 'customfield id of the AI Time Saved field — enables ai_time_saved_h'}

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      deployments: read
      security-events: read
      actions: read
    steps:
      - name: Checkout ai-sdlc-metrics
        uses: actions/checkout@v7
        with:
          repository: Seta-International/ai-sdlc-metrics

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Collect and upsert raw counts
        env:
          METRICS_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_EMAIL: ${{ secrets.jira-email }}
          JIRA_TOKEN: ${{ secrets.jira-token }}
          JIRA_AI_USAGE_FIELD: ${{ secrets.jira-ai-usage-field }}
          JIRA_AI_TOOL_FIELD: ${{ secrets.jira-ai-tool-field }}
          JIRA_AI_TIME_SAVED_FIELD: ${{ secrets.jira-ai-time-saved-field }}
          REPORTING_DB_URL: ${{ secrets.reporting-db-url }}
          GH_REPO: ${{ inputs.gh-repo }}
          JIRA_BASE: ${{ inputs.jira-base }}
          JIRA_PROJECT: ${{ inputs.jira-project }}
          PROJECT_LABEL: ${{ inputs.project }}
          GH_PROD_ENV: ${{ inputs.prod-env }}
          DEPLOY_COUNT_STRATEGY: ${{ inputs.deploy-strategy }}
        run: |
          set -euo pipefail
          ARGS=(--project "${{ inputs.project }}" --repo "${{ inputs.gh-repo }}" \
                --jira-project "${{ inputs.jira-project }}")
          case "${{ inputs.month }}" in
            '') ;;  # blank -> current month (collect.py's own default)
            previous) MONTH=$(date -u -d "$(date -u +%Y-%m-01) - 1 day" +%Y-%m)
                      ARGS+=(--month "$MONTH") ;;
            *) ARGS+=(--month "${{ inputs.month }}") ;;
          esac
          python -m collector.collect "${ARGS[@]}"
