name: Deploy · staging
run-name: Deploy ${{ inputs.app }} → staging · ${{ github.sha }} · @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      app:
        description: App to deploy (apps/<name>)
        type: choice
        required: true
        default: api
        options:
          - api

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build, push to ECR, roll ECS service
    runs-on: ubuntu-latest
    environment: staging
    env:
      APP: ${{ inputs.app }}
      ECR_REPO: seta-${{ inputs.app }}
      ECS_SERVICE: seta-${{ inputs.app }}-staging
      DOCKERFILE: apps/${{ inputs.app }}/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_STAGING }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:staging
          cache-from: type=gha,scope=${{ inputs.app }}
          cache-to: type=gha,mode=max,scope=${{ inputs.app }}

      - name: Register new task definition revision
        id: register
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
        run: |
          set -euo pipefail
          aws ecs describe-task-definition --task-definition "$ECS_SERVICE" --query 'taskDefinition' \
            | jq --arg IMG "$IMAGE" '
                .containerDefinitions[0].image = $IMG
                | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                      .compatibilities, .registeredAt, .registeredBy)
              ' > task-def.json
          ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-def.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Roll ECS service
        env:
          CLUSTER: ${{ vars.ECS_CLUSTER_STAGING }}
          TASK_DEF_ARN: ${{ steps.register.outputs.arn }}
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$TASK_DEF_ARN" \
            > /dev/null
          aws ecs wait services-stable --cluster "$CLUSTER" --services "$ECS_SERVICE"
