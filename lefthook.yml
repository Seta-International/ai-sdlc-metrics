# Fast checks only on commit; heavier checks on push.
pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,json}"
      run: ./node_modules/.bin/biome check --write {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: ./node_modules/.bin/turbo run typecheck --filter='...[origin/main]'
    test:
      run: ./node_modules/.bin/turbo run test:unit --filter='...[origin/main]'
