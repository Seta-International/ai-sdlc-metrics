pre-commit:
  parallel: true
  commands:
    format-check:
      glob: '*.{ts,tsx,js,mjs,json,md}'
      run: bunx prettier --check {staged_files}
    design-tokens:
      glob: '*.{ts,tsx,js,jsx}'
      run: node scripts/check-design-tokens.js {staged_files}

pre-push:
  parallel: true
  commands:
    lint:
      run: bun turbo lint
    typecheck:
      run: bun turbo typecheck
    test:
      run: bun turbo test:unit
