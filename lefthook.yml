pre-commit:
  parallel: true
  commands:
    format-check:
      glob: '*.{ts,tsx,js,mjs,json,md}'
      run: bunx prettier --check {staged_files}
    design-tokens:
      glob: '*.{ts,tsx,js,jsx}'
      run: bash scripts/check-design-tokens.sh {staged_files}
    ddd-boundaries:
      glob: '*.{ts,tsx}'
      run: bash scripts/check-ddd-boundaries.sh {staged_files}
    ui-components:
      glob: '*.tsx'
      run: bash scripts/check-ui-components.sh {staged_files}
    template-drift:
      glob: 'turbo/generators/templates/**'
      run: bun run --filter @future/generators drift:check

pre-push:
  parallel: true
  commands:
    lint:
      run: bun turbo lint
    typecheck:
      run: bun turbo typecheck
    test:
      run: bun turbo test:unit
