pre-commit:
  parallel: true
  commands:
    format-check:
      glob: '*.{ts,tsx,js,mjs,json,md}'
      run: bunx prettier --check {staged_files}
    lint:
      glob: '*.{ts,tsx}'
      run: bunx eslint {staged_files}

pre-push:
  commands:
    typecheck:
      run: bun turbo typecheck
    test:
      run: bun turbo test
